# vaultflow configuration
# Copy this file to config/vaultflow.local.yaml and fill in your paths.
# vaultflow.local.yaml is gitignored — your real paths never leave your machine.

paths:
  # Where your vault lives
  vault_root: "C:/Users/YOU/vault"

  # Where vaultflow writes metrics (SQLite, Parquet, sessions)
  metrics_root: "C:/Users/YOU/vault/methodology/.metrics"

  # Claude Code project memory files
  projects_memory: "C:/Users/YOU/.claude/projects"

  # Claude Code skill index (for router)
  skills_index: "C:/Users/YOU/.claude/skills/index.md"

  # Vault workflow (for model tier routing)
  ai_workflow: "C:/Users/YOU/vault/methodology/ai-workflow.md"

  # Glob pattern for all project wikis
  wiki_glob: "C:/GIT/*/wiki/**/*.md"

  # Glob pattern for all project CLAUDE.md files
  claude_glob: "C:/GIT/*/CLAUDE.md"

  # Projects to exclude from wiki/CLAUDE.md backfill (folder name matching)
  exclude_projects: []

  # Path prefixes to exclude from code-graph indexing (forward slashes, case-insensitive).
  # Add snapshot/mirror copies of repos here so their symbols don't pollute impact analysis.
  # Example: D:/vaultflow is an in-sync snapshot of C:/GIT/vaultflow — exclude it.
  exclude_index_prefixes:
    - "D:/vaultflow"

  # Vault tool registry
  vault_tools_index: "C:/Users/YOU/vault/tools/index.md"

  # Vault agent registry
  vault_agents_index: "C:/Users/YOU/vault/agents/index.md"

  # Domain knowledge directory — auto-imported into dictionary
  vault_domain_dir: "C:/Users/YOU/vault/domain"

  # Watched folder for Claude Desktop / claude.ai chat exports. Drop Anthropic's
  # account data export here (a conversations.json, or an unzipped export folder
  # containing one); the nightly run imports new/changed chats automatically.
  claude_export_dir: "C:/Users/YOU/Downloads/claude-exports"

  # ruflo .agents/ directory (Codex CLI skills)
  agents_dir: "C:/GIT/vaultflow/.agents"

  # User-level Claude Code skills
  user_skills_dir: "C:/Users/YOU/.claude/skills"

  # Glob for project-level .claude/agents/ markdown files
  project_agents_glob: "C:/GIT/*/.claude/agents/*.md"

  # Root directory for the filesystem watcher daemon (captures background agent edits)
  # Defaults to the parent of wiki_glob if not set
  watcher_watch_dir: "C:/GIT"

storage:
  db_file: "vaultflow.db"          # relative to metrics_root
  parquet_dir: "parquet"           # relative to metrics_root
  memory_store: "memory-store.json"
  sessions_dir: "sessions"
  discoveries_dir: "discoveries"
  tool_calls_parquet: "tool_calls.parquet"
  prompts_parquet: "prompts.parquet"

intelligence:
  page_rank_damping: 0.85
  max_graph_nodes: 5000
  similarity_threshold: 0.8
  confidence_decay_rate: 0.005
  access_boost_amount: 0.03
  consolidation_threshold: 10
  pattern_fire_threshold: 10
  skill_inject_high_threshold: 0.6
  skill_inject_low_threshold: 0.3
  prompt_similarity_threshold: 0.4
  stack_detect_on_session_start: true
  dictionary_auto_populate: true
  tool_auto_promote_calls: 5
  tool_auto_promote_sessions: 3
  context_token_budget: 400        # max tokens injected per getContext() call
  context_entry_max_tokens: 120    # max tokens per individual memory entry body

memory:
  context_injection_limit: 5
  max_import_file_size_mb: 10
  short_term_days: 1
  long_term_days: 30

model_routing:
  pinned_agents:
    - project-manager      # always top tier — orchestration errors are catastrophic
    - security-reviewer    # always top tier — missed vulnerabilities are catastrophic
  demotion_threshold: 0.95     # approval rate required before demotion eligible
  demotion_min_sessions: 10    # minimum completed sessions and reviewed verdicts before demotion

dashboard:
  port: 7700
  host: "localhost"
