# =============================================================================
# vaultflow — Codex CLI Configuration
# =============================================================================
# Derived from ruflo's Claude Flow V3 config.
# Stripped: fake Ed25519 signing, auto-push, swarm/neural infra, MCP claude-flow.
# Kept: 15 adopted dev/analysis skills, sensible approval policy, security rules.
#
# Model: claude-sonnet (Mid tier — matches dev-team default)
# Usage: codex --config .agents/config.toml <task>
# =============================================================================

# -----------------------------------------------------------------------------
# Core
# -----------------------------------------------------------------------------

model           = "claude-sonnet"
approval_policy = "on-failure"
sandbox_mode    = "workspace-write"
web_search      = "cached"

# -----------------------------------------------------------------------------
# Project Documentation
# -----------------------------------------------------------------------------

project_doc_max_bytes = 65536

project_doc_fallback_filenames = [
  "AGENTS.md",
  "CLAUDE.md",
  ".agents.md"
]

# -----------------------------------------------------------------------------
# Features
# -----------------------------------------------------------------------------

[features]
child_agents_md   = true
shell_snapshot    = true
request_rule      = true
remote_compaction = false   # vaultflow uses its own SQLite/Parquet pipeline

# -----------------------------------------------------------------------------
# Profiles
# -----------------------------------------------------------------------------

# Standard interactive work
[profiles.dev]
approval_policy = "on-failure"
sandbox_mode    = "workspace-write"
web_search      = "live"

# Locked-down read-only analysis
[profiles.safe]
approval_policy = "untrusted"
sandbox_mode    = "read-only"
web_search      = "disabled"

# Automated CI — no human in the loop
[profiles.ci]
approval_policy = "never"
sandbox_mode    = "workspace-write"
web_search      = "cached"

# -----------------------------------------------------------------------------
# History
# -----------------------------------------------------------------------------

[history]
persistence = "save-all"

# -----------------------------------------------------------------------------
# Shell Environment
# -----------------------------------------------------------------------------

[shell_environment_policy]
inherit = "core"
exclude = ["*_KEY", "*_SECRET", "*_TOKEN", "*_PASSWORD", "*_CREDENTIAL"]

# -----------------------------------------------------------------------------
# Sandbox
# -----------------------------------------------------------------------------

[sandbox_workspace_write]
writable_roots    = []
network_access    = true
exclude_slash_tmp = false

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------

[security]
input_validation          = true
path_traversal_prevention = true
secret_scanning           = true
cve_scanning              = true
max_file_size             = 10485760
allowed_extensions        = []
blocked_patterns          = ["\\.env$", "credentials\\.json$", "\\.pem$", "\\.key$", "\\.masterkey$", "\\.recovery$"]

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------

[performance]
max_agents         = 4
task_timeout       = 300
memory_limit       = "512MB"
cache_enabled      = true
cache_ttl          = 3600
parallel_execution = true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

[logging]
level       = "info"
format      = "pretty"
destination = "stdout"

# =============================================================================
# Skills — 15 Adopted  (119 disabled)
# =============================================================================
# Adopted: practical dev/analysis agents that work without swarm infra.
# Disabled: swarm coordinators, neural/SONA layers, payments, GitHub automation,
#           V3 infra, ruflo-specific memory management.
#
# Trigger keywords used by vaultflow router for auto-spawn routing.
# =============================================================================

